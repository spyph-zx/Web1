<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgMusic" src="audio.mp3"></audio>

<div class="blossoms"></div>

<div class="mobile-frame">

    <!-- Entry -->
    <div class="page active" id="entryPage">
        <button id="enterBtn">Enter ❤️</button>
    </div>

    <!-- Page 1 -->
    <div class="page" id="page1">
        <img src="gif1.gif" class="gif">
        <p class="glow-text">Your first romantic sentence here ❤️</p>
        <div class="buttons">
            <button class="same-btn" onclick="showFinal()">Yes ❤️</button>
            <button class="same-btn" onclick="nextPage(2)">No 💔</button>
        </div>
    </div>

    <!-- Page 2 -->
    <div class="page" id="page2">
        <img src="gif2.gif" class="gif">
        <p class="glow-text">Your second sentence here 🌙</p>
        <div class="buttons">
            <button class="same-btn" onclick="showFinal()">Yes ❤️</button>
            <button class="same-btn" onclick="nextPage(3)">No 💔</button>
        </div>
    </div>

    <!-- Page 3 -->
    <div class="page" id="page3">
        <img src="gif3.gif" class="gif">
        <p class="glow-text">Your third sentence here ✨</p>
        <div class="buttons">
            <button class="same-btn" onclick="showFinal()">Yes ❤️</button>
            <button class="same-btn" onclick="nextPage(4)">No 💔</button>
        </div>
    </div>

    <!-- Page 4 -->
    <div class="page" id="page4">
        <img src="gif4.gif" class="gif">
        <p class="glow-text">Last chance... Will you stay forever? ❤️</p>

        <div class="buttons move-zone">
            <button class="same-btn" onclick="showFinal()">Yes ❤️</button>
            <button class="same-btn" id="noBtn">No 💔</button>
        </div>
    </div>

    <!-- Final -->
    <div class="page" id="finalPage">
        <img src="gif5.gif" class="gif">
        <p class="glow-text">You just made my heart complete ❤️</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
